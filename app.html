<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #output {
            background: #1a1a1a;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>🤖 RAT CONTROL</h1>
    
    <div>
        <input type="text" id="serverIP" value="ratcontrol.serveousercontent.com" style="width: 300px; padding: 10px;">
        <button onclick="testConnection()">Подключиться</button>
    </div>
    
    <div id="connectionStatus" class="status"></div>
    
    <button onclick="sendCommand('system')">Информация</button>
    <button onclick="sendCommand('cpu')">CPU</button>
    <button onclick="sendCommand('memory')">RAM</button>
    
    <div id="output"></div>

    <script>
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';
        
        function getProxiedUrl(endpoint) {
            const server = document.getElementById('serverIP').value;
            const cleanServer = server.replace('https://', '').replace('http://', '').split(':')[0];
            const targetUrl = `http://${cleanServer}${endpoint}`;
            return PROXY_URL + encodeURIComponent(targetUrl);
        }

        async function testConnection() {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.textContent = '⏳ Проверка...';
            
            try {
                const url = getProxiedUrl('/');
                const response = await fetch(url);
                const text = await response.text();
                
                if (text.includes('✅')) {
                    statusDiv.textContent = '✅ Подключено';
                    statusDiv.style.color = '#155724';
                    statusDiv.style.background = '#d4edda';
                } else {
                    throw new Error('Неверный ответ');
                }
            } catch (e) {
                statusDiv.textContent = '❌ Ошибка: ' + e.message;
                statusDiv.style.color = '#721c24';
                statusDiv.style.background = '#f8d7da';
            }
        }

        async function sendCommand(cmd) {
            const outputDiv = document.getElementById('output');
            outputDiv.textContent = '⏳ Отправка...';
            
            try {
                const url = getProxiedUrl('/api/command');
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                
                const data = await response.json();
                outputDiv.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                outputDiv.textContent = '❌ Ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
