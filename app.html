<!DOCTYPE html>
<html>
<head>
    <title>RAT Control</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333);
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .card {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        button {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .output {
            background: var(--tg-theme-bg-color, #f0f0f0);
            border-radius: 10px;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.warning { background: #fff3cd; color: #856404; display: block; }
        .ip-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>🤖 RAT CONTROL</h1>
    <p>Управление компьютером</p>

    <div class="card">
        <h3>🔌 Подключение к серверу</h3>
        <input type="text" id="serverIP" class="ip-input" placeholder="IP адрес компьютера" value="localhost">
        <button onclick="testConnection()">🔄 Проверить соединение</button>
        <div id="connectionStatus" class="status"></div>
    </div>

    <div class="card">
        <h3>📊 ИНФОРМАЦИЯ</h3>
        <button onclick="sendCommand('info')">🔄 Обновить информацию</button>
        <div id="infoOutput" class="output">Нажмите кнопку</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран

        let serverIP = 'localhost';
        const port = 5000;

        function getBaseUrl() {
            return `http://${serverIP}:${port}`;
        }

        async function testConnection() {
            serverIP = document.getElementById('serverIP').value;
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.className = 'status warning';
            statusDiv.textContent = '⏳ Проверка...';

            try {
                const response = await fetch(getBaseUrl() + '/');
                const text = await response.text();
                if (text.includes('✅')) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Подключено к серверу!';
                } else {
                    throw new Error('Неверный ответ');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Ошибка: ' + error.message;
            }
        }

        async function sendCommand(cmd) {
            serverIP = document.getElementById('serverIP').value;
            const outputDiv = document.getElementById('infoOutput');
            const statusDiv = document.getElementById('connectionStatus');
            outputDiv.textContent = '⏳ Загрузка...';

            try {
                const response = await fetch(getBaseUrl() + '/api/info');
                if (!response.ok) throw new Error('HTTP error ' + response.status);
                const data = await response.json();

                if (data.success) {
                    const d = data.data;
                    outputDiv.innerHTML = `
📊 ИНФОРМАЦИЯ О СИСТЕМЕ
═══════════════════════
💻 Компьютер: ${d.computer}
👤 Пользователь: ${d.user}
🖥️ ОС: ${d.os}
⏱️ Запуск: ${d.boot}

⚙️ Процессор: ${d.cpu}%
💾 ОЗУ: ${d.ram_used}/${d.ram_total} ГБ (${d.ram_percent}%)
💿 Диск C: ${d.disk_used}/${d.disk_total} ГБ (${d.disk_percent}%)
🌐 IP: ${d.ip}
                    `;
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Данные получены';
                } else {
                    throw new Error('Ошибка сервера');
                }
            } catch (error) {
                outputDiv.textContent = '❌ Ошибка: ' + error.message;
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Нет соединения';
            }
        }

        // Пробуем подключиться при загрузке
        setTimeout(testConnection, 500);
    </script>
</body>
</html>
