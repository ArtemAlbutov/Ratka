<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>263</title>
</head>
<body>
    263
    <script>
        const today = new Date();
        const start = new Date(today.getFullYear(), 0, 0);
        const dayNum = Math.floor((today - start) / 86400000);
        const daysLeft = 365 - dayNum;
        document.body.innerText = daysLeft;
        document.title = daysLeft;
    </script>
</body>
</html>
